name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          mypy src 2>&1 | tee mypy-output.txt
      - name: Upload mypy output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-output
          path: mypy-output.txt
          if-no-files-found: ignore
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          pytest -q --cov=doc2knowledge --cov-report=term-missing 2>&1 | tee pytest-output.txt
      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt
          if-no-files-found: ignore
      - name: Build package
        run: python -m build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build -t doc2knowledge:ci .
